name: Draft

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: draft-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_NAME: ft-pipeline

jobs:
  build:
    name: build-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: ft-pipeline
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: ft-pipeline.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: ft-pipeline
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_name: ft-pipeline
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deno
        with:
          install-sqlite: "false"

      - name: Compile
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          deno compile \
            --allow-read \
            --allow-write \
            --allow-env \
            --allow-sys=homedir \
            --allow-net \
            --exclude-unused-npm \
            --target "${{ matrix.target }}" \
            -o "dist/${{ env.PROJECT_NAME }}" \
            src/main.ts
          if [[ ! -f "dist/${{ matrix.bin_name }}" ]]; then
            if [[ -f "dist/${{ env.PROJECT_NAME }}" ]]; then
              mv "dist/${{ env.PROJECT_NAME }}" "dist/${{ matrix.bin_name }}"
            else
              ls -la dist/
              exit 1
            fi
          fi

      - name: Ensure zip (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zip >/dev/null 2>&1; then
            choco install zip -y --no-progress
          fi
          zip --version | head -1

      - name: Pack artifact
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ matrix.target }}-${{ github.ref_name }}"
          mkdir -p "${ARTIFACT_NAME}"
          cp "dist/${{ matrix.bin_name }}" "${ARTIFACT_NAME}/"
          cp README.md "${ARTIFACT_NAME}/" 2>/dev/null || true
          find . -maxdepth 1 -type f \( -name 'LICENSE*' -o -name 'LICENCE*' \) \
            -exec cp {} "${ARTIFACT_NAME}/" \; || true
          # Zip *contents* of the staging dir (cd + zip .), not the dir itself.
          # Users should get: zip -> files. Not: zip -> ARTIFACT_NAME/ -> files.
          (cd "${ARTIFACT_NAME}" && zip -r "../${ARTIFACT_NAME}.zip" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.target }}-${{ github.ref_name }}
          path: ${{ env.PROJECT_NAME }}-${{ matrix.target }}-${{ github.ref_name }}.zip
          if-no-files-found: error
          compression-level: 9

  draft:
    name: draft-release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          draft: true
          files: ${{ env.PROJECT_NAME }}-*
          generate_release_notes: true

  # Nightly tracks the dev tip (day-to-day branch). main is for stable/tag releases.
  nightly:
    name: nightly-release
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Nightly body
        run: |
          {
            echo 'NIGHTLY_BODY<<EOF'
            echo "Branch: dev"
            echo "From commit: ${GITHUB_SHA:0:8}"
            echo "Generated on: $(date -u +"%Y-%m-%d %H:%M") UTC"
            echo "Platforms: linux-x64, windows-x64, macos-arm64, macos-x64"
            echo "Compile: least-privilege (read/write/env/sys=homedir/net); node:sqlite embedded."
            echo "No host sqlite3 CLI required (node:sqlite in binary)."
            echo "EOF"
          } >> "$GITHUB_ENV"

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      # API only (default GITHUB_TOKEN). Avoid git force-push of tags: that can fail when
      # the commit tree includes .github/workflows changes.
      - name: Drop previous nightly release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Release Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          fail_on_unmatched_files: true
          files: ${{ env.PROJECT_NAME }}-*
          name: Nightly Build
          body: ${{ env.NIGHTLY_BODY }}
          target_commitish: ${{ github.sha }}

      # Keep heads/nightly parked on the same SHA as the release (follows dev).
      - name: Point nightly branch at this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh api "repos/${{ github.repository }}/git/ref/heads/nightly" >/dev/null 2>&1; then
            gh api -X PATCH "repos/${{ github.repository }}/git/refs/heads/nightly" \
              -f sha="${{ github.sha }}" \
              -F force=true
          else
            gh api -X POST "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/heads/nightly" \
              -f sha="${{ github.sha }}"
          fi
